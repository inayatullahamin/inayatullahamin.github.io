# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
title: "Inayat Ullah"
email: inayat@kdis.ac.kr
description: >-
  Personal academic website of Inayat Ullah

# Use the AcademicPages theme
remote_theme: academicpages/academicpages

url: "https://inayatullahamin.github.io"  # your GitHub Pages URL
baseurl: ""  # leave empty for username.github.io

# -----------------------------------------------------------------------------
# Build settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-scholar

# -----------------------------------------------------------------------------
# Collections (optional)
# -----------------------------------------------------------------------------
collections:
  teaching:
    output: true
  news:
    output: true
  projects:
    output: true

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# -----------------------------------------------------------------------------
# Exclude
# -----------------------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
